<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        // Switched back to signInWithPopup for cross-domain reliability
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";
        import { getFirestore, collection, addDoc, serverTimestamp, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDCAHxbic6CnLgieNd6vr0UKtByIX9XI-0",
            authDomain: "dryclean-307e9.firebaseapp.com",
            projectId: "dryclean-307e9",
            storageBucket: "3dmosta1001", 
            messagingSenderId: "1055119275702",
            appId: "1:1055119275702:web:7d139a70004583b1be9817"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const storage = getStorage(app);
        const db = getFirestore(app);

        const loginSec = document.getElementById('login-section');
        const uploadSec = document.getElementById('upload-section');
        const dashSec = document.getElementById('dashboard-section');
        const statusText = document.getElementById('upload-status');
        const loginBtn = document.getElementById('loginBtn');
        
        let currentUser = null;

        // THE BULLETPROOF LOGIN BUTTON
        loginBtn.addEventListener('click', () => {
            // Lock the button immediately to prevent double-clicks
            loginBtn.disabled = true;
            loginBtn.innerText = "Opening Google...";

            signInWithPopup(auth, new GoogleAuthProvider())
                .catch(err => {
                    // If it fails, unlock the button and tell the user why
                    alert("Login Failed: " + err.message + "\n\nTip: Look at the top right of your web address bar and make sure popups are allowed for this site!");
                    loginBtn.disabled = false;
                    loginBtn.innerText = "Sign in with Google";
                });
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth).then(() => location.reload());
        });

        // Listen for Authentication State
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                loginSec.style.display = 'none';
                checkUserModels(user.uid);
            } else {
                loginSec.style.display = 'block';
                uploadSec.style.display = 'none';
                dashSec.style.display = 'none';
            }
        });

        async function checkUserModels(uid) {
            const q = query(collection(db, "clients"), where("uid", "==", uid));
            const querySnapshot = await getDocs(q);

            if (!querySnapshot.empty) {
                const userDoc = querySnapshot.docs[0];
                const data = userDoc.data();
                const docId = userDoc.id;
                
                uploadSec.style.display = 'none';
                dashSec.style.display = 'block';
                
                const maxScans = data.maxScans || 3;
                document.getElementById('scan-count-display').innerText = data.scanCount || 0;
                document.getElementById('max-scans-display').innerText = maxScans;
                
                if ((data.scanCount || 0) >= maxScans) {
                    document.getElementById('limit-warning').style.display = 'block';
                }

                const clientLink = `https://mostafaebrahiem.github.io/ar-models/?id=${docId}`;
                document.getElementById('client-link-display').href = clientLink;
                document.getElementById('client-link-display').innerText = clientLink;

                document.getElementById("qrcode").innerHTML = "";
                new QRCode(document.getElementById("qrcode"), { text: clientLink, width: 150, height: 150 });

            } else {
                dashSec.style.display = 'none';
                uploadSec.style.display = 'block';
            }
        }

        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const previewContainer = document.getElementById('preview-container');
        const localViewer = document.getElementById('local-viewer');
        
        // 50MB Limit
        const MAX_FILE_SIZE = 50 * 1024 * 1024;

        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            statusText.innerText = "";
            
            if (file) {
                if (file.size > MAX_FILE_SIZE) {
                    statusText.innerText = "Error: File is too large! Maximum allowed size is 50MB.";
                    statusText.style.color = "red";
                    fileInput.value = ""; 
                    previewContainer.style.display = 'none';
                    uploadBtn.style.display = 'none';
                    return; 
                }

                localViewer.setAttribute('src', URL.createObjectURL(file));
                previewContainer.style.display = 'block';
                uploadBtn.style.display = 'block';
            } else {
                previewContainer.style.display = 'none';
                uploadBtn.style.display = 'none';
            }
        });

        uploadBtn.addEventListener('click', () => {
            const file = fileInput.files[0];
            if (!file || !currentUser) return;

            uploadBtn.disabled = true;
            statusText.innerText = "Uploading... Please wait.";
            statusText.style.color = "#007bff";

            const storageRef = ref(storage, 'models/' + currentUser.uid + '_' + file.name);
            const uploadTask = uploadBytesResumable(storageRef, file);

            uploadTask.on('state_changed', null, 
                (error) => { 
                    statusText.innerText = "Upload failed: " + error.message; 
                    statusText.style.color = "red";
                    uploadBtn.disabled = false;
                }, 
                () => {
                    getDownloadURL(uploadTask.snapshot.ref).then(async (downloadURL) => {
                        statusText.innerText = "Saving profile...";
                        await addDoc(collection(db, "clients"), {
                            uid: currentUser.uid,          
                            userEmail: currentUser.email,  
                            fileName: file.name,
                            modelUrl: downloadURL,
                            scanCount: 0,
                            maxScans: 3,                   
                            createdAt: serverTimestamp()
                        });
                        location.reload();
                    });
                }
            );
        });
    </script>
