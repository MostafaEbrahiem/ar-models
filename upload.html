<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Dashboard</title>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-B80PCPRNQ9"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-B80PCPRNQ9');
    </script>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; color: #333; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        
        #login-section, #upload-section, #dashboard-section { display: none; }
        
        button { border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; margin-top: 10px; transition: 0.2s; }
        .btn-google { background-color: #4285F4; color: white; }
        .btn-google:hover { background-color: #3367D6; }
        .btn-upload { background-color: #28a745; color: white; display: none; }
        .btn-download { background-color: #17a2b8; color: white; margin-bottom: 20px; }
        .btn-download:hover { background-color: #138496; }
        .btn-logout { background-color: #dc3545; color: white; margin-top: 20px; }
        
        input[type="file"] { margin: 20px 0; padding: 10px; width: 100%; box-sizing: border-box; }
        #preview-container { display: none; margin: 15px 0; border: 2px dashed #ccc; border-radius: 8px; overflow: hidden; background: #fafafa; }
        model-viewer { width: 100%; height: 300px; }
        
        .stats-box { background: #e9ecef; padding: 15px; border-radius: 8px; margin: 20px 0; font-size: 18px; }
        .alert { color: #dc3545; font-weight: bold; }

        .progress-wrapper { display: none; margin-top: 15px; width: 100%; }
        .progress-bar-bg { background-color: #e9ecef; border-radius: 5px; width: 100%; height: 20px; overflow: hidden; }
        .progress-bar-fill { background-color: #007bff; width: 0%; height: 100%; transition: width 0.2s ease; }
        .progress-text { margin-top: 8px; font-size: 14px; font-weight: bold; color: #555; }
    </style>
</head>
<body>

    <div class="card">
        
        <div id="login-section">
            <h2>Welcome to AR Platform</h2>
            <p>Sign in to upload and manage your 3D model.</p>
            <button id="loginBtn" class="btn-google">Sign in with Google</button>
        </div>

        <div id="upload-section">
            <h2>Upload Your Model</h2>
            <p>You are allowed <b>1 model</b> and <b>3 free scans</b>.</p>
            <p style="font-size: 14px; color: #666;">Max file size: <b>50MB</b></p>
            <input type="file" id="fileInput" accept=".glb">
            <div id="preview-container">
                <model-viewer 
                    id="local-viewer" 
                    crossorigin="anonymous"
                    alt="A 3D model preview"
                    auto-rotate 
                    camera-controls 
                    autoplay
                    environment-image="neutral"
                    shadow-intensity="1"
                    camera-orbit="auto auto 500%" 
                    max-camera-orbit="auto auto 1000%">
                </model-viewer>
            </div>
            <button id="uploadBtn" class="btn-upload">Confirm & Upload</button>
            <p id="upload-status" style="margin-top:15px; font-weight: bold;"></p>
            
            <div class="progress-wrapper" id="progress-wrapper">
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progress-bar"></div>
                </div>
                <p class="progress-text" id="progress-text">0% Uploaded</p>
            </div>
        </div>

        <div id="dashboard-section">
            <h2>Your AR Model</h2>
            <div class="stats-box">
                Scans Used: <span id="scan-count-display">0</span> / <span id="max-scans-display">3</span>
            </div>
            <div id="limit-warning" class="alert" style="display:none;">
                You have run out of free scans! Contact support to upgrade.
            </div>
            
            <p style="margin-top: 20px;"><b>Your QR Code:</b></p>
            <div id="qrcode" style="display: flex; justify-content: center; margin: 15px 0;"></div>
            
            <button id="downloadQrBtn" class="btn-download">Download QR Code</button>
            <br>

            <a id="client-link-display" href="#" target="_blank" style="color: #007bff; word-break: break-all;"></a>
            
            <button id="logoutBtn" class="btn-logout">Sign Out</button>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";
        import { getFirestore, collection, addDoc, serverTimestamp, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDCAHxbic6CnLgieNd6vr0UKtByIX9XI-0",
            authDomain: "dryclean-307e9.firebaseapp.com",
            projectId: "dryclean-307e9",
            storageBucket: "3dmosta1001", 
            messagingSenderId: "1055119275702",
            appId: "1:1055119275702:web:7d139a70004583b1be9817"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const storage = getStorage(app);
        const db = getFirestore(app);

        const loginSec = document.getElementById('login-section');
        const uploadSec = document.getElementById('upload-section');
        const dashSec = document.getElementById('dashboard-section');
        const statusText = document.getElementById('upload-status');
        const loginBtn = document.getElementById('loginBtn');
        
        let currentUser = null;

        loginBtn.addEventListener('click', () => {
            loginBtn.disabled = true;
            loginBtn.innerText = "Opening Google...";
            signInWithPopup(auth, new GoogleAuthProvider()).catch(err => {
                alert("Login Failed: " + err.message);
                loginBtn.disabled = false;
                loginBtn.innerText = "Sign in with Google";
            });
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth).then(() => location.reload());
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                loginSec.style.display = 'none';
                checkUserModels(user.uid);
            } else {
                loginSec.style.display = 'block';
                uploadSec.style.display = 'none';
                dashSec.style.display = 'none';
            }
        });

        async function checkUserModels(uid) {
            const q = query(collection(db, "clients"), where("uid", "==", uid));
            const querySnapshot = await getDocs(q);

            if (!querySnapshot.empty) {
                const userDoc = querySnapshot.docs[0];
                const data = userDoc.data();
                const docId = userDoc.id;
                
                uploadSec.style.display = 'none';
                dashSec.style.display = 'block';
                
                const maxScans = data.maxScans || 3;
                document.getElementById('scan-count-display').innerText = data.scanCount || 0;
                document.getElementById('max-scans-display').innerText = maxScans;
                
                if ((data.scanCount || 0) >= maxScans) {
                    document.getElementById('limit-warning').style.display = 'block';
                }

                const clientLink = `https://3dmosta.com/?id=${docId}`;
                document.getElementById('client-link-display').href = clientLink;
                document.getElementById('client-link-display').innerText = clientLink;

                document.getElementById("qrcode").innerHTML = "";
                new QRCode(document.getElementById("qrcode"), { text: clientLink, width: 150, height: 150 });

            } else {
                dashSec.style.display = 'none';
                uploadSec.style.display = 'block';
            }
        }

        document.getElementById('downloadQrBtn').addEventListener('click', () => {
            const qrCanvas = document.querySelector('#qrcode canvas');
            const qrImg = document.querySelector('#qrcode img');
            let imgUrl = qrCanvas ? qrCanvas.toDataURL('image/png') : (qrImg ? qrImg.src : null);

            if (imgUrl) {
                const link = document.createElement('a');
                link.href = imgUrl;
                link.download = '3Dmosta_QR_Code.png';
                link.click();
            }
        });

        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const previewContainer = document.getElementById('preview-container');
        const localViewer = document.getElementById('local-viewer');
        const progressWrapper = document.getElementById('progress-wrapper');
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');
        
        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            statusText.innerText = "";
            if (file) {
                if (file.size > 50 * 1024 * 1024) {
                    statusText.innerText = "Error: File is too large!";
                    return; 
                }
                localViewer.setAttribute('src', URL.createObjectURL(file));
                previewContainer.style.display = 'block';
                uploadBtn.style.display = 'block';
            }
        });

        uploadBtn.addEventListener('click', () => {
            const file = fileInput.files[0];
            if (!file || !currentUser) return;
            uploadBtn.disabled = true;
            progressWrapper.style.display = 'block';

            const storageRef = ref(storage, 'models/' + currentUser.uid + '_' + file.name);
            const uploadTask = uploadBytesResumable(storageRef, file);

            uploadTask.on('state_changed', 
                (snapshot) => {
                    const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                    progressBar.style.width = Math.round(progress) + '%';
                    progressText.innerText = Math.round(progress) + '% Uploaded';
                }, 
                (error) => { alert(error.message); uploadBtn.disabled = false; }, 
                () => {
                    getDownloadURL(uploadTask.snapshot.ref).then(async (downloadURL) => {
                        await addDoc(collection(db, "clients"), {
                            uid: currentUser.uid,          
                            userEmail: currentUser.email,  
                            fileName: file.name,
                            modelUrl: downloadURL,
                            scanCount: 0,
                            maxScans: 3,                   
                            createdAt: serverTimestamp()
                        });
                        location.reload(); 
                    });
                }
            );
        });
    </script>
</body>
</html>
