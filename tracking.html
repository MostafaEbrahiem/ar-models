<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Image Tracking AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        
        /* Simple UI to tell the user what to do */
        #ui {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            z-index: 999;
            color: white;
            font-family: sans-serif;
            text-shadow: 2px 2px 4px #000000;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h3>Point your camera at a Hiro Marker</h3>
    </div>

<a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3; trackingMethod: best;"
        renderer="logarithmicDepthBuffer: true; colorManagement: true;">
        
        <a-light type="ambient" color="#ffffff" intensity="0.8"></a-light>
        <a-light type="directional" color="#ffffff" intensity="0.5" position="1 2 1"></a-light>

        <!-- Added smoothing parameters so the model doesn't vanish instantly -->
        <a-marker preset="hiro" smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">
            
            <a-entity 
                id="ar-model" 
                position="0 0 0" 
                scale="0.5 0.5 0.5" 
                rotation="-90 0 0"
                animation-mixer>
            </a-entity>
            
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // 1. Grab the Firebase model URL from the web address parameter
        const urlParams = new URLSearchParams(window.location.search);
        const modelUrl = urlParams.get('model');
        
        // 2. Inject that URL directly into the A-Frame AR entity
        if (modelUrl) {
            document.getElementById('ar-model').setAttribute('gltf-model', modelUrl);
        } else {
            // If something goes wrong, show an error on the screen
            document.getElementById('ui').innerHTML = "<h3 style='color:red;'>Error: No 3D model found to display!</h3>";
        }
    </script>
</body>
</html>
