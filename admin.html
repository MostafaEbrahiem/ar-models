<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3Dmosta | Admin Command Center</title>

    <link rel="icon" type="image/x-icon" href="favicon.ico?v=2">

    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --dark-bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body { font-family: 'Inter', -apple-system, sans-serif; background-color: var(--dark-bg); color: var(--text-main); margin: 0; padding: 0; min-height: 100vh; }
        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% -20%, #1e293b, #0f172a); z-index: -1; }

        /* NAVBAR */
        .navbar { position: fixed; top: 0; left: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; box-sizing: border-box; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); z-index: 100; }
        .nav-logo { font-size: 24px; font-weight: 800; color: white; text-decoration: none; letter-spacing: -1px; }
        .admin-badge { background: rgba(239, 68, 68, 0.2); color: #ef4444; padding: 5px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; border: 1px solid rgba(239, 68, 68, 0.3); margin-left: 10px;}

        /* LAYOUT */
        .dashboard-container { max-width: 1100px; margin: 100px auto 40px; padding: 0 20px; position: relative; z-index: 10; }
        .glass-panel { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        
        .header-panel { padding: 30px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
        .header-panel h2 { margin: 0; color: white; font-size: 28px; }
        .header-panel p { color: var(--text-dim); margin: 5px 0 0 0; }
        
        #login-section, #denied-section { text-align: center; padding: 50px; max-width: 400px; margin: 150px auto; position: relative; z-index: 10; }
        #login-section h2, #denied-section h2 { color: white; margin-top: 0; }
        #dashboard-ui, #denied-section { display: none; }

        /* BUTTONS */
        button { border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; font-size: 15px; font-weight: bold; transition: all 0.2s; }
        .btn-google { background: white; color: #333; width: 100%; font-size: 16px; margin-top: 15px; }
        .btn-google:hover { background: #f8fafc; transform: translateY(-2px); }
        .btn-logout { background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
        .btn-logout:hover { background: rgba(255, 255, 255, 0.2); }
        
        .btn-upgrade { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; width: 100%; margin-top: 15px; }
        .btn-upgrade:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(0, 210, 255, 0.4); }
        
        .btn-downgrade { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); width: 100%; margin-top: 10px; }
        .btn-downgrade:hover { background: #ef4444; color: #fff; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }

        .btn-save-limits { background: #10b981; color: white; width: 100%; margin-top: 10px; padding: 8px; font-size: 13px; }
        .btn-save-limits:hover { background: #059669; }

        /* USER GRID */
        .users-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 30px; }
        .user-card { padding: 25px; display: flex; flex-direction: column; }
        .user-card h3 { margin: 0 0 5px 0; font-size: 18px; color: white; word-break: break-all; }
        
        .stats-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); margin: 15px 0; }
        .stat-line { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 14px; color: var(--text-dim); }
        .stat-line strong { color: var(--text-main); }
        
        .admin-input { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 6px; border-radius: 6px; width: 60px; text-align: center; font-weight: bold;}
        
        .badge-pro { background: rgba(34, 197, 94, 0.2); color: #4ade80; padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; border: 1px solid rgba(34, 197, 94, 0.3); }
        .badge-free { background: rgba(255, 255, 255, 0.1); color: var(--text-dim); padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; border: 1px solid rgba(255, 255, 255, 0.2); }

        /* INDIVIDUAL MODELS LIST */
        .model-list { margin-top: 10px; max-height: 180px; overflow-y: auto; padding-right: 5px; }
        .model-list::-webkit-scrollbar { width: 6px; }
        .model-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .model-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .model-item { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.03); }
        .model-item-info { display: flex; flex-direction: column; gap: 3px; overflow: hidden; }
        .model-item-title { font-size: 13px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; color: white; }
        .model-item-scans { font-size: 11px; color: var(--text-dim); }
        
        .model-actions { display: flex; gap: 6px; }
        .btn-tiny { padding: 6px 10px; font-size: 11px; border-radius: 6px; }
        .btn-tiny-view { background: rgba(0, 210, 255, 0.1); color: var(--primary); border: 1px solid rgba(0, 210, 255, 0.3); }
        .btn-tiny-view:hover { background: var(--primary); color: #000; box-shadow: 0 0 10px rgba(0, 210, 255, 0.4); }
        .btn-tiny-delete { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
        .btn-tiny-delete:hover { background: #ef4444; color: #fff; box-shadow: 0 0 10px rgba(239, 68, 68, 0.4); }

    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <nav class="navbar">
        <div style="display: flex; align-items: center;">
            <a href="index.html" class="nav-logo">3Dmosta</a>
            <span class="admin-badge">ADMIN</span>
        </div>
    </nav>

    <div id="login-section" class="glass-panel">
        <h2>Admin Authentication</h2>
        <p>Restricted access. Please sign in.</p>
        <button id="loginBtn" class="btn-google">Sign in with Google</button>
    </div>

    <div id="denied-section" class="glass-panel">
        <h2 style="color: #ef4444;">Access Denied</h2>
        <p>Your account does not have administrator privileges.</p>
        <button id="logoutDeniedBtn" class="btn-logout" style="margin-top: 15px; width: 100%;">Sign Out</button>
    </div>

    <div id="dashboard-ui" class="dashboard-container">
        
        <div class="header-panel glass-panel">
            <div>
                <h2>User Management</h2>
                <p>Monitor users, update AI limits, and manage content.</p>
            </div>
            <button id="logoutBtn" class="btn-logout">Sign Out</button>
        </div>

        <div class="users-grid" id="users-grid"></div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, doc, updateDoc, writeBatch, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, deleteObject } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDCAHxbic6CnLgieNd6vr0UKtByIX9XI-0",
            authDomain: "dryclean-307e9.firebaseapp.com",
            projectId: "dryclean-307e9",
            storageBucket: "3dmosta1001", 
            messagingSenderId: "1055119275702",
            appId: "1:1055119275702:web:7d139a70004583b1be9817"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // Make sure to replace this with your actual admin email!
        const ADMIN_EMAIL = "mostafaebrahiem1998@gmail.com";

        const loginSec = document.getElementById('login-section');
        const deniedSec = document.getElementById('denied-section');
        const dashboardUI = document.getElementById('dashboard-ui');
        const usersGrid = document.getElementById('users-grid');
        
        document.getElementById('loginBtn').addEventListener('click', () => {
            signInWithPopup(auth, new GoogleAuthProvider()).catch(err => alert(err.message));
        });

        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth).then(() => location.reload()));
        document.getElementById('logoutDeniedBtn').addEventListener('click', () => signOut(auth).then(() => location.reload()));

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                if (user.email === ADMIN_EMAIL) {
                    loginSec.style.display = 'none';
                    deniedSec.style.display = 'none';
                    dashboardUI.style.display = 'block';
                    loadAllUsers();
                } else {
                    loginSec.style.display = 'none';
                    deniedSec.style.display = 'block';
                    dashboardUI.style.display = 'none';
                }
            } else {
                loginSec.style.display = 'block';
                deniedSec.style.display = 'none';
                dashboardUI.style.display = 'none';
            }
        });

        async function loadAllUsers() {
            usersGrid.innerHTML = "<p style='grid-column: 1 / -1; text-align: center; color: var(--text-dim);'>Fetching database...</p>";
            
            const usersMap = {};

            // 1. Fetch User Profiles (Billing & Limits)
            const usersSnapshot = await getDocs(collection(db, "users"));
            usersSnapshot.forEach(docSnap => {
                const data = docSnap.data();
                usersMap[docSnap.id] = {
                    email: data.userEmail || "Unknown",
                    isPro: data.isPro || false,
                    aiUsed: data.aiGenerationsUsed || 0,
                    aiAllowed: data.aiGenerationsAllowed || 0,
                    maxScans: data.maxScans || 3,
                    models: []
                };
            });

            // 2. Fetch Models and attach to Users
            const modelsSnapshot = await getDocs(collection(db, "clients"));
            modelsSnapshot.forEach(docSnap => {
                const data = docSnap.data();
                const uid = data.uid;
                
                // If user uploaded a model but doesn't have a profile yet (legacy data)
                if (!usersMap[uid]) {
                    usersMap[uid] = { 
                        email: data.userEmail || "Unknown", 
                        isPro: data.maxScans > 3, 
                        aiUsed: 0, 
                        aiAllowed: data.maxScans > 3 ? 10 : 0, 
                        maxScans: data.maxScans || 3,
                        models: [] 
                    };
                }
                usersMap[uid].models.push({ id: docSnap.id, ...data });
            });

            if (Object.keys(usersMap).length === 0) {
                usersGrid.innerHTML = "<p style='grid-column: 1 / -1; text-align: center; color: var(--text-dim);'>No users found in database.</p>";
                return;
            }

            usersGrid.innerHTML = ""; 

            // 3. Render User Cards
            Object.keys(usersMap).forEach(uid => {
                const userData = usersMap[uid];
                const statusBadge = userData.isPro ? `<span class="badge-pro">PRO PLAN</span>` : `<span class="badge-free">FREE TIER</span>`;

                let modelsHTML = '<div class="model-list">';
                userData.models.forEach(model => {
                    const displayName = model.fileName ? model.fileName.replace('.glb', '') : 'Unnamed Model';
                    const scansUsed = model.scanCount || 0;
                    const encodedUrl = encodeURIComponent(model.modelUrl);

                    modelsHTML += `
                        <div class="model-item" id="model-item-${model.id}">
                            <div class="model-item-info">
                                <span class="model-item-title" title="${displayName}">${displayName}</span>
                                <span class="model-item-scans">Scans: ${scansUsed} / ${model.maxScans || 3}</span>
                            </div>
                            <div class="model-actions">
                                <button class="btn-tiny btn-tiny-view" onclick="window.open('fallback.html?model=${encodedUrl}', '_blank')">View</button>
                                <button class="btn-tiny btn-tiny-delete delete-model-btn" data-id="${model.id}" data-uid="${uid}" data-filename="${model.fileName}" data-name="${displayName}">Delete</button>
                            </div>
                        </div>
                    `;
                });
                modelsHTML += '</div>';

                const card = document.createElement('div');
                card.className = 'user-card glass-panel';
                card.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: start;">
                        <h3>${userData.email}</h3>
                    </div>
                    ${statusBadge}
                    
                    <div class="stats-box">
                        <div class="stat-line"><span>Uploaded Models:</span> <strong>${userData.models.length}</strong></div>
                        <div class="stat-line"><span>AI Generations Used:</span> <strong>${userData.aiUsed}</strong></div>
                        
                        <div style="height: 1px; background: rgba(255,255,255,0.1); margin: 10px 0;"></div>
                        
                        <div class="stat-line">
                            <span>Max AI Models Allowed:</span> 
                            <input type="number" id="ai-allow-${uid}" class="admin-input" value="${userData.aiAllowed}">
                        </div>
                        <div class="stat-line">
                            <span>Max AR Scans (Per Code):</span> 
                            <input type="number" id="scans-allow-${uid}" class="admin-input" value="${userData.maxScans}">
                        </div>
                        <button class="btn-save-limits" id="save-limits-${uid}">Save Limits & Sync Models</button>
                    </div>
                    
                    <strong style="font-size: 13px; color: var(--text-dim); margin-top: 5px;">User Files:</strong>
                    ${modelsHTML}
                    
                    <div style="margin-top: 15px; display: flex; gap: 10px;">
                        <button id="upgrade-${uid}" class="btn-upgrade" ${userData.isPro ? 'style="display:none;"' : ''}>Grant Pro Access</button>
                        <button id="downgrade-${uid}" class="btn-downgrade" ${!userData.isPro ? 'style="display:none;"' : ''}>Revoke Pro Access</button>
                    </div>
                `;
                usersGrid.appendChild(card);

                // --- ATTACH EVENT LISTENERS ---

                // Save Limits & Sync
                document.getElementById(`save-limits-${uid}`).addEventListener('click', async (e) => {
                    e.target.innerText = "Saving...";
                    e.target.disabled = true;
                    
                    const newAiLimit = parseInt(document.getElementById(`ai-allow-${uid}`).value);
                    const newScanLimit = parseInt(document.getElementById(`scans-allow-${uid}`).value);

                    try {
                        // 1. Update User Profile
                        await updateDoc(doc(db, "users", uid), {
                            aiGenerationsAllowed: newAiLimit,
                            maxScans: newScanLimit
                        });

                        // 2. Sync all their existing models to the new Scan Limit
                        const batch = writeBatch(db);
                        userData.models.forEach(model => {
                            batch.update(doc(db, "clients", model.id), { maxScans: newScanLimit });
                        });
                        await batch.commit();

                        e.target.innerText = "Saved!";
                        setTimeout(() => e.target.innerText = "Save Limits & Sync Models", 2000);
                        e.target.disabled = false;
                    } catch (error) {
                        alert("Error saving limits: " + error.message);
                        e.target.innerText = "Save Limits & Sync Models";
                        e.target.disabled = false;
                    }
                });

                // Upgrade to Pro
                if(!userData.isPro) {
                    document.getElementById(`upgrade-${uid}`).addEventListener('click', async (e) => {
                        if(confirm(`Upgrade ${userData.email} to PRO?`)) {
                            e.target.innerText = "Upgrading...";
                            e.target.disabled = true;
                            
                            // Update Profile
                            await updateDoc(doc(db, "users", uid), { isPro: true, maxScans: 1000, aiGenerationsAllowed: 10 });

                            // Update Models
                            const batch = writeBatch(db);
                            userData.models.forEach(model => { batch.update(doc(db, "clients", model.id), { maxScans: 1000 }); });
                            await batch.commit();
                            
                            location.reload();
                        }
                    });
                }

                // Downgrade to Free
                if(userData.isPro) {
                    document.getElementById(`downgrade-${uid}`).addEventListener('click', async (e) => {
                        if(confirm(`Downgrade ${userData.email} to FREE?`)) {
                            e.target.innerText = "Downgrading...";
                            e.target.disabled = true;
                            
                            // Update Profile
                            await updateDoc(doc(db, "users", uid), { isPro: false, maxScans: 3, aiGenerationsAllowed: 0 });

                            // Update Models
                            const batch = writeBatch(db);
                            userData.models.forEach(model => { batch.update(doc(db, "clients", model.id), { maxScans: 3 }); });
                            await batch.commit();
                            
                            location.reload();
                        }
                    });
                }
            });

            // Delete Model Listener
            document.querySelectorAll('.delete-model-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const docId = e.target.getAttribute('data-id');
                    const fileUid = e.target.getAttribute('data-uid');
                    const fileName = e.target.getAttribute('data-filename');
                    const modelName = e.target.getAttribute('data-name');
                    
                    if(confirm(`ADMIN WARNING: Delete "${modelName}"?`)) {
                        e.target.innerText = "...";
                        e.target.disabled = true;
                        try {
                            if (fileName) {
                                const fileRef = ref(storage, `models/${fileUid}_${fileName}`);
                                await deleteObject(fileRef).catch(err => console.warn("File missing in storage"));
                            }
                            await deleteDoc(doc(db, "clients", docId));
                            document.getElementById(`model-item-${docId}`).remove();
                        } catch(error) {
                            alert("Failed to delete model.");
                            e.target.innerText = "Delete";
                            e.target.disabled = false;
                        }
                    }
                });
            });
        }
    </script>
</body>
</html>
