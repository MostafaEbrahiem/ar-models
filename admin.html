<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Admin Dashboard</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; }
        
        /* Header and Stats Styling */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        h1 { margin: 0; font-size: 24px; color: #2c3e50; }
        .stats-container { display: flex; gap: 15px; width: 100%; }
        .stat-card { background: #007bff; color: white; padding: 20px; border-radius: 10px; flex: 1; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .stat-card h3 { margin: 0 0 10px 0; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.9; }
        .stat-card p { margin: 0; font-size: 28px; font-weight: bold; }
        .stat-card.dark { background: #2c3e50; }

        /* Table Styling */
        .table-wrapper { background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background-color: #f8f9fa; padding: 15px; border-bottom: 2px solid #e9ecef; color: #495057; }
        td { padding: 15px; border-bottom: 1px solid #e9ecef; vertical-align: middle; }
        tr:hover { background-color: #f8f9fa; }
        
        .scan-badge { background: #28a745; color: white; padding: 5px 10px; border-radius: 20px; font-weight: bold; font-size: 14px; }
        
        /* Button Styling */
        .action-buttons { display: flex; gap: 10px; align-items: center; }
        .link-btn { background: #e9ecef; color: #333; text-decoration: none; padding: 6px 12px; border-radius: 5px; font-size: 14px; transition: 0.2s; border: none; cursor: pointer; }
        .link-btn:hover { background: #ced4da; }
        .delete-btn { background: #dc3545; color: white; }
        .delete-btn:hover { background: #c82333; }
        
        /* Mobile adjustments */
        @media (max-width: 600px) {
            .stats-container { flex-direction: column; }
            th, td { padding: 10px; }
            .action-buttons { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Platform Dashboard</h1>
            <a href="upload.html" class="link-btn" style="background: #007bff; color: white;">+ Upload New Model</a>
        </div>

        <div class="stats-container">
            <div class="stat-card">
                <h3>Total Models</h3>
                <p id="total-models">0</p>
            </div>
            <div class="stat-card dark">
                <h3>Total Scans</h3>
                <p id="total-scans">0</p>
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Model Name</th>
                        <th>Total Scans</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr>
                        <td colspan="3" style="text-align: center;">Loading data from database...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        // Added 'deleteDoc' and 'doc' to the imports so we can delete records
        import { getFirestore, collection, getDocs, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Your exact Firebase Keys
        const firebaseConfig = {
            apiKey: "AIzaSyDCAHxbic6CnLgieNd6vr0UKtByIX9XI-0",
            authDomain: "dryclean-307e9.firebaseapp.com",
            projectId: "dryclean-307e9",
            storageBucket: "3dmosta1001", 
            messagingSenderId: "1055119275702",
            appId: "1:1055119275702:web:7d139a70004583b1be9817"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Making variables global so we can update them when a file is deleted
        let totalModelsCount = 0;
        let totalScansCount = 0;

        async function loadDashboardData() {
            const tableBody = document.getElementById('table-body');
            const totalModelsEl = document.getElementById('total-models');
            const totalScansEl = document.getElementById('total-scans');

            try {
                const q = query(collection(db, "clients"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                
                tableBody.innerHTML = ''; 
                totalModelsCount = 0;
                totalScansCount = 0;

                if (querySnapshot.empty) {
                    tableBody.innerHTML = '<tr><td colspan="3" style="text-align: center;">No models uploaded yet.</td></tr>';
                    return;
                }

                querySnapshot.forEach((documentSnapshot) => {
                    const data = documentSnapshot.data();
                    const docId = documentSnapshot.id;
                    const scans = data.scanCount || 0;
                    
                    totalModelsCount++;
                    totalScansCount += scans;

                    const displayName = data.fileName ? data.fileName.replace('.glb', '') : 'Unnamed Model';
                    const clientLink = `https://mostafaebrahiem.github.io/ar-models/?id=${docId}`;

                    const tr = document.createElement('tr');
                    tr.id = `row-${docId}`; // Give the row an ID so we can remove it easily
                    
                    tr.innerHTML = `
                        <td><strong>${displayName}</strong></td>
                        <td><span class="scan-badge">${scans}</span></td>
                        <td>
                            <div class="action-buttons">
                                <a href="${clientLink}" target="_blank" class="link-btn">View Live</a>
                                <button class="link-btn delete-btn" data-id="${docId}" data-name="${displayName}" data-scans="${scans}">Delete</button>
                            </div>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });

                // Update the stats at the top
                totalModelsEl.innerText = totalModelsCount;
                totalScansEl.innerText = totalScansCount;

                // Attach delete logic to all the new delete buttons
                attachDeleteListeners();

            } catch (error) {
                console.error("Error loading data: ", error);
                tableBody.innerHTML = `<tr><td colspan="3" style="text-align: center; color: red;">Error loading data. Check console.</td></tr>`;
            }
        }

        function attachDeleteListeners() {
            const deleteButtons = document.querySelectorAll('.delete-btn');
            
            deleteButtons.forEach(button => {
                button.addEventListener('click', async (e) => {
                    const docId = e.target.getAttribute('data-id');
                    const modelName = e.target.getAttribute('data-name');
                    const scans = parseInt(e.target.getAttribute('data-scans'));

                    // Ask for confirmation before deleting
                    const isConfirmed = confirm(`Are you sure you want to delete "${modelName}"? This will deactivate the QR code.`);
                    
                    if (isConfirmed) {
                        e.target.innerText = "Deleting...";
                        e.target.style.opacity = "0.5";
                        
                        try {
                            // 1. Delete the record from Firebase Firestore
                            await deleteDoc(doc(db, "clients", docId));
                            
                            // 2. Remove the row from the table instantly
                            document.getElementById(`row-${docId}`).remove();
                            
                            // 3. Update the big numbers at the top
                            totalModelsCount--;
                            totalScansCount -= scans;
                            document.getElementById('total-models').innerText = totalModelsCount;
                            document.getElementById('total-scans').innerText = totalScansCount;

                            // 4. If table is empty, show empty message
                            if (totalModelsCount === 0) {
                                document.getElementById('table-body').innerHTML = '<tr><td colspan="3" style="text-align: center;">No models uploaded yet.</td></tr>';
                            }
                            
                        } catch (error) {
                            console.error("Error deleting document: ", error);
                            alert("Failed to delete the model. Please check your connection.");
                            e.target.innerText = "Delete";
                            e.target.style.opacity = "1";
                        }
                    }
                });
            });
        }

        // Run the function when the page loads
        loadDashboardData();
    </script>
</body>
</html>
