<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D AR Viewer</title>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-B80PCPRNQ9"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-B80PCPRNQ9');
    </script>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        /* Full screen dark background for the best AR experience */
        body { margin: 0; padding: 0; background-color: #111; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: -apple-system, sans-serif; }
        
        model-viewer { width: 100%; height: 100%; }
        
        #error-message { color: white; display: none; text-align: center; padding: 20px; background: #222; border-radius: 10px; max-width: 80%; }
        #error-message h2 { color: #dc3545; margin-top: 0; }
    </style>
</head>
<body>

    <div id="error-message">
        <h2>Model Not Found</h2>
        <p>We couldn't load the requested 3D model. Please check the scan link and try again.</p>
    </div>
    
    <model-viewer 
        id="ar-viewer" 
        auto-rotate 
        camera-controls 
        shadow-intensity="1" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        environment-image="neutral" 
        autoplay 
        style="display: none;">
    </model-viewer>

    <script>
        // Grab the model URL that was passed from index.html (the Bouncer)
        const urlParams = new URLSearchParams(window.location.search);
        const modelUrl = urlParams.get('model');
        const viewer = document.getElementById('ar-viewer');
        const errorMsg = document.getElementById('error-message');

        if (modelUrl) {
            // Decode the URL and feed it to the AR viewer
            viewer.setAttribute('src', decodeURIComponent(modelUrl));
            viewer.style.display = 'block';
        } else {
            // If no model was passed in the URL, show an error
            errorMsg.style.display = 'block';
        }
    </script>

</body>
</html>
