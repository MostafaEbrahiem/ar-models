<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Product Viewer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #ffffff; overflow: hidden; }
        model-viewer { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <model-viewer 
        id="viewer"
        alt="A 3D model" 
        auto-rotate 
        camera-controls>
    </model-viewer>

    <script>
        // Grab the Firebase model URL from the web address
        const urlParams = new URLSearchParams(window.location.search);
        const modelUrl = urlParams.get('model');
        
        // Inject that URL into the 3D viewer
        if(modelUrl) {
            document.getElementById('viewer').setAttribute('src', modelUrl);
        } else {
            alert("No 3D model found!");
        }
    </script>
</body>
</html>
