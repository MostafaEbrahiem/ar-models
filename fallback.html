<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Product Viewer</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        /* This makes the 3D viewer take up the entire phone screen */
        body { margin: 0; padding: 0; background-color: #ffffff; overflow: hidden; }
        model-viewer { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <model-viewer 
        src="https://mostafaebrahiem.github.io/ar-models/cube.glb" 
        alt="A 3D model of a cube" 
        auto-rotate 
        camera-controls>
    </model-viewer>

</body>
</html>
