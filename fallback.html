<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Viewer | 3Dmosta</title>

    <link rel="icon" type="image/x-icon" href="favicon.ico?v=2">
    <link rel="apple-touch-icon" href="apple-touch-icon.png?v=2">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-B80PCPRNQ9"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-B80PCPRNQ9');
    </script>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --dark-bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body { margin: 0; padding: 0; background-color: var(--dark-bg); overflow: hidden; height: 100vh; font-family: 'Inter', -apple-system, sans-serif; display: flex; flex-direction: column; color: var(--text-main); }
        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% -20%, #1e293b, #0f172a); z-index: -1; }
        
        #viewer-container { flex-grow: 1; width: 100%; height: 100%; position: relative; z-index: 10; }
        model-viewer { width: 100%; height: 100%; background-color: transparent; }
        
        #error-message { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); display: none; text-align: center; padding: 40px 20px; z-index: 20; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 500px; box-sizing: border-box; }
        #error-message h2 { color: #ef4444; margin-top: 0; }
        #error-message p { color: var(--text-dim); }
        #debug-text { font-family: monospace; font-size: 12px; color: #f8fafc; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); display: inline-block; max-width: 100%; word-break: break-all; margin-top: 20px; }
        
        /* Premium Glow Progress Bar */
        .progress-bar { display: block; width: 60%; height: 12px; position: absolute; left: 20%; top: 50%; transform: translateY(-50%); border-radius: 99px; border: 1px solid rgba(255,255,255,0.1); background-color: rgba(255, 255, 255, 0.1); overflow: hidden; backdrop-filter: blur(4px);}
        .progress-bar.hide { visibility: hidden; transition: visibility 0.3s; }
        .update-bar { background: linear-gradient(90deg, var(--primary), var(--secondary)); width: 0%; height: 100%; transition: width 0.3s; box-shadow: 0 0 15px var(--primary); }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div id="viewer-container">
        <div id="error-message">
            <h2>Model Failed to Load</h2>
            <p>We encountered an issue loading the 3D file. The link may be broken or the model was deleted.</p>
            <div id="debug-text">Waiting for error details...</div>
        </div>

        <model-viewer 
            id="ar-viewer" 
            crossorigin="anonymous"
            alt="A 3D model"
            auto-rotate 
            camera-controls 
            autoplay
            environment-image="neutral"
            shadow-intensity="1"
            camera-orbit="auto auto 500%" 
            max-camera-orbit="auto auto 1000%">
            
            <div class="progress-bar hide" slot="progress-bar">
                <div class="update-bar"></div>
            </div>
        </model-viewer>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let modelUrl = urlParams.get('model');
        const viewer = document.getElementById('ar-viewer');
        const errorMsg = document.getElementById('error-message');
        const debugText = document.getElementById('debug-text');

        if (modelUrl) {
            // Fixes Firebase storage URL formatting issues automatically
            if (modelUrl.includes('/o/models/')) {
                modelUrl = modelUrl.replace('/o/models/', '/o/models%2F');
            }

            viewer.setAttribute('src', modelUrl);
            
            viewer.addEventListener('progress', (event) => {
                const progressBar = viewer.querySelector('.progress-bar');
                const updateBar = viewer.querySelector('.update-bar');
                updateBar.style.width = `${event.detail.totalProgress * 100}%`;
                if (event.detail.totalProgress === 1) progressBar.classList.add('hide');
                else progressBar.classList.remove('hide');
            });

            viewer.addEventListener('error', (event) => {
                viewer.style.display = 'none';
                errorMsg.style.display = 'block';
                debugText.innerText = "Attempted to load:\n" + modelUrl;
            });

        } else {
            viewer.style.display = 'none';
            errorMsg.style.display = 'block';
            debugText.innerText = "No model ID was found in the web address.";
        }
    </script>
</body>
</html>
