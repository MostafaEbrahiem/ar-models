<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>3Dmosta | Fullscreen AR Viewer</title>
    
    <link rel="icon" type="image/x-icon" href="favicon.ico?v=2">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-B80PCPRNQ9"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-B80PCPRNQ9');
    </script>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js" type="module"></script>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#72dcff",
                        "secondary": "#65a1fe",
                        "background": "#F0F0F0",
                        "surface-variant": "#192540",
                        "surface-container-low": "#091328",
                        "surface-container-high": "#141f38",
                        "surface-container-lowest": "#000000",
                        "on-surface": "#dee5ff",
                        "on-surface-variant": "#a3aac4",
                        "outline-variant": "#40485d",
                        "error": "#ff716c",
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
        }
        model-viewer {
            width: 100%;
            height: 100%;
            background-color: #000000;
            --poster-color: transparent;
            outline: none;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        #ar-button {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
    </style>
</head>

<body class="bg-surface-container-lowest">
    
    <main class="relative w-full h-full">
        
        <div id="error-overlay" class="hidden absolute inset-0 z-[200] bg-black/90 backdrop-blur-md flex flex-col items-center justify-center p-8 text-center">
            <span class="material-symbols-outlined text-6xl text-error mb-4">gpp_bad</span>
            <h2 class="text-2xl font-headline font-bold text-white mb-2">Model Failed to Load</h2>
            <p class="text-on-surface-variant text-sm mb-6 max-w-md">We encountered an issue loading the 3D file. The link may be broken, invalid, or the model was deleted by the owner.</p>
            <p id="debug-text" class="text-xs text-outline-variant font-mono max-w-full break-all bg-surface-container-high p-4 rounded-lg border border-outline-variant/20"></p>
        </div>

        <model-viewer 
            id="main-viewer" 
            class="w-full h-full" 
            crossorigin="anonymous"
            alt="A high-fidelity 3D model hosted on 3Dmosta" 
            ar 
            ar-modes="webxr scene-viewer quick-look" 
            auto-rotate 
            autoplay
            camera-controls 
            environment-image="neutral" 
            exposure="1" 
            shadow-intensity="1"
            camera-orbit="auto auto 500%" 
            max-camera-orbit="auto auto 1000%"
            src="">
            
            <button id="ar-button" slot="ar-button" class="bg-gradient-to-r from-primary to-secondary text-slate-900 px-6 py-3 font-headline font-bold text-sm tracking-tight rounded-lg shadow-[0_0_15px_rgba(0,210,255,0.4)] hover:scale-105 transition-transform z-50">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">view_in_ar</span>
                VIEW IN YOUR SPACE
            </button>
            
            <div slot="poster" id="loading-poster" class="absolute inset-0 flex items-center justify-center bg-surface-container-lowest z-40">
                <div class="flex flex-col items-center gap-4">
                    <div class="w-12 h-12 border-2 border-primary border-t-transparent rounded-full animate-spin"></div>
                    <span class="font-headline text-on-surface-variant tracking-widest text-xs uppercase">Initializing Hologram</span>
                </div>
            </div>

            <div class="absolute top-6 left-6 z-10">
                <button onclick="window.location.href='index.html'" class="bg-surface-variant/40 backdrop-blur-xl border border-outline-variant/20 p-3 flex items-center justify-center rounded-xl text-on-surface hover:bg-surface-variant/60 transition-all active:scale-90 shadow-lg">
                    <span class="material-symbols-outlined">home</span>
                </button>
            </div>

            <div class="absolute top-6 right-6 z-10 text-right">
                <div class="bg-surface-variant/40 backdrop-blur-xl border border-outline-variant/20 px-4 py-2 rounded-xl shadow-lg">
                    <h1 id="asset-title" class="font-headline font-bold text-on-surface tracking-tight text-sm">LOADING ASSET...</h1>
                    <p class="font-label text-[10px] text-on-surface-variant uppercase tracking-widest">3Dmosta Precision Engine</p>
                </div>
            </div>

        </model-viewer>

        <footer class="absolute bottom-6 left-0 w-full flex justify-center pointer-events-none z-10">
            <a href="index.html" class="pointer-events-auto group flex items-center gap-2 px-4 py-2 bg-black/40 backdrop-blur-md rounded-full border border-white/10 transition-all hover:bg-black/60 shadow-lg">
                <span class="text-[10px] font-label text-on-surface-variant tracking-[0.2em] uppercase">Powered by</span>
                <span class="font-headline font-bold text-xs tracking-tight bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent group-hover:opacity-80 transition-opacity">3Dmosta</span>
            </a>
        </footer>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let modelUrl = urlParams.get('model');
        const viewer = document.getElementById('main-viewer');
        const errorOverlay = document.getElementById('error-overlay');
        const debugText = document.getElementById('debug-text');
        const assetTitle = document.getElementById('asset-title');
        const loadingPoster = document.getElementById('loading-poster');

        if (modelUrl) {
            // Fixes Firebase storage URL formatting issues automatically
            if (modelUrl.includes('/o/models/')) {
                modelUrl = modelUrl.replace('/o/models/', '/o/models%2F');
            }

            // Set the 3D model source
            viewer.setAttribute('src', modelUrl);
            assetTitle.innerText = "HOLOGRAPHIC ASSET";
            
            // Handle loading errors
            viewer.addEventListener('error', (event) => {
                loadingPoster.style.display = 'none';
                errorOverlay.classList.remove('hidden');
                debugText.innerText = "Attempted to load:\n" + modelUrl;
            });

        } else {
            // No model provided in the URL
            loadingPoster.style.display = 'none';
            errorOverlay.classList.remove('hidden');
            debugText.innerText = "No model ID was found in the web address parameters.";
        }
    </script>
</body>
</html>
