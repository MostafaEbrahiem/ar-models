<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D AR Viewer</title>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-B80PCPRNQ9"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-B80PCPRNQ9');
    </script>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        body { margin: 0; padding: 0; background-color: #f4f7f6; overflow: hidden; height: 100vh; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; }
        #viewer-container { flex-grow: 1; width: 100%; height: 100%; position: relative; }
        
        model-viewer { width: 100%; height: 100%; background-color: #eeeeee; }
        
        #error-message { color: #333; display: none; text-align: center; padding: 40px 20px; z-index: 10; position: absolute; top: 20%; width: 100%; box-sizing: border-box; }
        #error-message h2 { color: #dc3545; }
        #debug-text { font-family: monospace; font-size: 12px; color: #666; background: #fff; padding: 10px; border-radius: 5px; border: 1px solid #ccc; display: inline-block; max-width: 90%; word-break: break-all; margin-top: 20px; }
        
        /* The Mobile Download Progress Bar */
        .progress-bar { display: block; width: 50%; height: 8px; position: absolute; left: 25%; top: 50%; transform: translateY(-50%); border-radius: 4px; box-shadow: 0px 2px 10px rgba(0, 0, 0, 0.1); background-color: rgba(255, 255, 255, 0.8); overflow: hidden;}
        .progress-bar.hide { visibility: hidden; transition: visibility 0.3s; }
        .update-bar { background-color: #007bff; width: 0%; height: 100%; transition: width 0.3s; }
    </style>
</head>
<body>

    <div id="viewer-container">
        <div id="error-message">
            <h2>Model Failed to Load</h2>
            <p>We encountered an issue loading the 3D file.</p>
            <div id="debug-text">Waiting for error details...</div>
        </div>

        <model-viewer 
            id="ar-viewer" 
            crossorigin="anonymous"
            auto-rotate 
            camera-controls 
            shadow-intensity="1" 
            ar 
            ar-modes="webxr scene-viewer quick-look" 
            environment-image="neutral" 
            autoplay>
            
            <div class="progress-bar hide" slot="progress-bar">
                <div class="update-bar"></div>
            </div>

            <button slot="ar-button" style="background-color: white; border-radius: 8px; border: 1px solid #dadce0; position: absolute; bottom: 32px; right: 16px; padding: 12px 24px; font-weight: bold; font-size: 16px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); cursor: pointer; color: #333;">
                🚀 View in AR
            </button>
        </model-viewer>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let modelUrl = urlParams.get('model');
        const viewer = document.getElementById('ar-viewer');
        const errorMsg = document.getElementById('error-message');
        const debugText = document.getElementById('debug-text');

        if (modelUrl) {
            // THE FIX: If the browser accidentally decoded the Firebase folder slash, 
            // this forces it back into the safe %2F format so Firebase accepts the request!
            if (modelUrl.includes('/o/models/')) {
                modelUrl = modelUrl.replace('/o/models/', '/o/models%2F');
            }

            viewer.setAttribute('src', modelUrl);
            
            // Track Loading Progress
            viewer.addEventListener('progress', (event) => {
                const progressBar = viewer.querySelector('.progress-bar');
                const updateBar = viewer.querySelector('.update-bar');
                updateBar.style.width = `${event.detail.totalProgress * 100}%`;
                
                if (event.detail.totalProgress === 1) {
                    progressBar.classList.add('hide');
                } else {
                    progressBar.classList.remove('hide');
                }
            });

            // Catch errors
            viewer.addEventListener('error', (event) => {
                viewer.style.display = 'none';
                errorMsg.style.display = 'block';
                debugText.innerText = "Attempted to load:\n" + modelUrl;
                console.error("Model Viewer Error: ", event);
            });

        } else {
            viewer.style.display = 'none';
            errorMsg.style.display = 'block';
            debugText.innerText = "No model ID was found in the web address.";
        }
    </script>

</body>
</html>
