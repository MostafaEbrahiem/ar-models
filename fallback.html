<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Product Viewer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #ffffff; overflow: hidden; }
        model-viewer { width: 100vw; height: 100vh; }

        /* Custom styling for the new AR button */
        #ar-button {
            background-color: #007bff;
            color: white;
            border-radius: 30px;
            border: none;
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #ar-button:active { background-color: #0056b3; }

        /* If the phone does not support AR (like Huawei), hide this button */
        model-viewer[ar-status="not-presenting"] #ar-button[data-visibility="hidden"] {
            display: none;
        }
    </style>
</head>
<body>

    <model-viewer 
        id="viewer"
        alt="A 3D model" 
        auto-rotate 
        camera-controls
        autoplay
        ar
        ar-modes="scene-viewer webxr quick-look"
        environment-image="neutral"
        shadow-intensity="1"
        camera-orbit="auto auto 500%" 
        max-camera-orbit="auto auto 1000%">
        
        <button slot="ar-button" id="ar-button">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><circle cx="12" cy="12" r="3"/><path d="m19 12-4-2M5 12l4 2M12 5v4M12 15v4"/></svg>
            View in your room
        </button>
        
    </model-viewer>

    <script>
        // Grab the Firebase model URL from the web address
        const urlParams = new URLSearchParams(window.location.search);
        const modelUrl = urlParams.get('model');
        
        // Inject that URL into the 3D viewer
        if(modelUrl) {
            document.getElementById('viewer').setAttribute('src', modelUrl);
        } else {
            alert("No 3D model found to display!");
        }
    </script>
</body>
</html>
