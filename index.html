<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading AR...</title>
</head>
<body style="text-align: center; font-family: sans-serif; margin-top: 50px; background-color: #f4f4f4;">
    <h2>Opening AR Experience...</h2>
    <p>Please wait a moment.</p>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Your Exact Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDCAHxbic6CnLgieNd6vr0UKtByIX9XI-0",
            authDomain: "dryclean-307e9.firebaseapp.com",
            projectId: "dryclean-307e9",
            storageBucket: "3dmosta1001", 
            messagingSenderId: "1055119275702",
            appId: "1:1055119275702:web:7d139a70004583b1be9817"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function launchAR() {
            const urlParams = new URLSearchParams(window.location.search);
            const clientId = urlParams.get('id');

            if (!clientId) {
                document.body.innerHTML = "<h2>Error: Invalid QR Code.</h2><p>No ID found in the link.</p>";
                return;
            }

            try {
                const docRef = doc(db, "clients", clientId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    const modelUrl = data.modelUrl;

                    // Add +1 to the scan count
                    await updateDoc(docRef, { scanCount: increment(1) });

                    const fallbackUrl = `https://mostafaebrahiem.github.io/ar-models/fallback.html?model=${encodeURIComponent(modelUrl)}`;
                    const userAgent = navigator.userAgent || navigator.vendor || window.opera;

                    if (/android/i.test(userAgent)) {
                        // FIX: Safely encode the Firebase URL so Android doesn't delete the security token!
                        const safeModelUrl = encodeURIComponent(modelUrl);
                        
                        window.location.href = `intent://arvr.google.com/scene-viewer/1.0?file=${safeModelUrl}&mode=ar_only#Intent;scheme=https;package=com.google.ar.core;action=android.intent.action.VIEW;S.browser_fallback_url=${encodeURIComponent(fallbackUrl)};end;`;
                    } else {
                        window.location.href = fallbackUrl;
                    }

                } else {
                    document.body.innerHTML = "<h2>Error: 3D Model not found in database.</h2>";
                }
            } catch (error) {
                console.error("Database error:", error);
                document.body.innerHTML = "<h2>Error connecting to server.</h2>";
            }
        }

        launchAR();
    </script>
</body>
</html>
